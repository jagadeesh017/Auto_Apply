<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Auto Fill</title>
  <style>
    /* ── Reset & base ────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #f9f9f9;
      color: #333;
    }

    /* ── Header ──────────────────────────────── */
    header {
      background: #2563eb;
      color: #fff;
      padding: 12px 16px;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    header p {
      font-size: 11px;
      opacity: 0.85;
      margin-top: 2px;
    }

    /* ── Body ────────────────────────────────── */
    main {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Button ──────────────────────────────── */
    #fillBtn {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #fillBtn:hover  { background: #1d4ed8; }
    #fillBtn:active { background: #1e40af; }
    #fillBtn:disabled { background: #93c5fd; cursor: not-allowed; }

    /* ── Status message ──────────────────────── */
    #status {
      font-size: 12px;
      min-height: 16px;
      text-align: center;
      color: #16a34a;  /* green by default */
    }
    #status.error { color: #dc2626; }

    /* ── Profile preview ─────────────────────── */
    .profile {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 10px 12px;
    }
    .profile p {
      font-size: 11px;
      line-height: 1.7;
      color: #555;
    }
    .profile strong {
      color: #111;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header>
    <h1>Job Auto Fill</h1>
    <p>Autofill job application forms</p>
  </header>

  <main>
    <button id="fillBtn">Auto Fill</button>
    <p id="status"></p>

    <!-- Quick profile preview so the user knows what will be filled -->
    <div class="profile">
      <p><strong>Name:</strong> Jagadeesh Uttaravilli</p>
      <p><strong>Email:</strong> test@email.com</p>
      <p><strong>Phone:</strong> 9999999999</p>
      <p><strong>Skills:</strong> React, Node.js</p>
      <p><strong>Experience:</strong> Fresher</p>
    </div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
